<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmittance Grid</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 16px;
            flex-shrink: 0;
        }
        select {
            padding: 4px 8px;
            font-size: 0.9rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .outer {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }
        #patch-grid {
            display: grid;
            gap: 3px;
            justify-content: center;
        }
        .patch-cell {
            background: white;
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .patch-cell canvas {
            flex: 1;
            display: block;
            width: 100% !important;
            min-height: 0;
        }

    </style>
</head>
<body>
    <header>
        <h1 id="page-title" style="font-size:1.2rem;line-height:1.6;text-align:center;"></h1>
        <select id="slide-select">
            <option value="iamwsi_fda">AppliedImageWSI/FDA</option>
            <option value="iam_fda">AppliedImage/FDA</option>
            <option value="avian_fda">Avian/FDA</option>
            <option value="sierra_fda">Sierra/FDA</option>
            <option value="iamwsi_factory">AppliedImageWSI/Factory</option>
            <option value="iam_factory">AppliedImage/Factory</option>
            <option value="avian_factory">Avian/Factory</option>
        </select>
    </header>

    <div class="outer">
        <div id="patch-grid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const chartInstances = {};

        // Plugin: fill the chart plot area with patch color
        const plotAreaBg = {
            id: 'plotAreaBg',
            beforeDraw(chart) {
                const color = chart.options.plugins.plotAreaBg?.color;
                if (!color) return;
                const { ctx, chartArea: { left, top, width, height } } = chart;
                ctx.save();
                ctx.fillStyle = color;
                ctx.fillRect(left, top, width, height);
                ctx.restore();
            }
        };
        Chart.register(plotAreaBg);

        function computeNCols(data, nPatches) {
            const boxes = data.XY_patch_boxes;
            if (boxes && boxes.length > 0) {
                const y0   = boxes[0][1];
                const tol  = (boxes[0][3] - boxes[0][1]) * 0.5;
                return boxes.filter(b => Math.abs(b[1] - y0) < tol).length;
            }
            return 6;
        }

        function buildGrid(data) {
            const patches = data.patches || [];
            const nCols   = computeNCols(data, patches.length);
            const nRows   = Math.ceil(patches.length / nCols);
            const gap  = 3;
            const pad  = 16;
            const ow   = window.innerWidth  - pad;
            const oh   = window.innerHeight - document.querySelector('header').offsetHeight - pad;
            const cs   = Math.max(40, Math.floor(Math.min(
                (ow - (nCols - 1) * gap) / nCols,
                (oh - (nRows - 1) * gap) / nRows
            )));
            const grid = document.getElementById('patch-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${nCols}, ${cs}px)`;
            grid.style.gridAutoRows        = `${cs}px`;
            Object.values(chartInstances).forEach(c => c.destroy());
            Object.keys(chartInstances).forEach(k => delete chartInstances[k]);

            patches.forEach((p, i) => {
                const n = i + 1;
                const id = `ptrans_${n}`;

                const cell = document.createElement('div');
                cell.className = 'patch-cell';
                const canvas = document.createElement('canvas');
                canvas.id = id;
                cell.appendChild(canvas);
                grid.appendChild(cell);

                if (!p.trans_patch) return;

                const wl = p.trans_patch.wavelength;
                const first = wl[0], last = wl[wl.length - 1];
                let mids = wl.filter(w => w % 100 === 0);
                if (mids.length > 0 && mids[0] - first < 100) mids = mids.slice(1);
                if (mids.length > 0 && last - mids[mids.length - 1] < 100) mids = mids.slice(0, -1);
                const tickSet = new Set([first, ...mids, last]);

                const rgb = p.color_info?.color_rgb;
                const [r, g, b] = rgb ? rgb.map(Math.round) : [255, 255, 255];

                const ctx = canvas.getContext('2d');
                chartInstances[id] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: wl,
                        datasets: [{
                            data: p.trans_patch.amplitude,
                            borderColor: 'magenta',
                            borderWidth: 1.5,
                            fill: false,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        plugins: {
                            legend: { display: false },
                            title: {
                                display: true,
                                text: p.patch_marker ?? String(n).padStart(2, '0'),
                                font: { weight: 'bold', size: 11 },
                                padding: { top: 2, bottom: 1 }
                            },
                            plotAreaBg: { color: `rgb(${r},${g},${b})` }
                        },
                        scales: {
                            x: { ticks: { display: false }, grid: { display: false } },
                            y: { min: 0, max: 1, ticks: { display: false }, grid: { display: false } }
                        }
                    }
                });
            });
        }

        function loadSlide(name) {
            fetch(`${name}.json`)
                .then(r => r.json())
                .then(data => {
                    document.title = `${data.basic_info.name} — Transmittance Grid`;
                    document.getElementById('page-title').innerHTML =
                        `${data.basic_info.name}<br>${data.basic_info.sn}<br>${data.basic_info.measurement_data_file}`;
                    window._slideData = data;
                    buildGrid(data);
                })
                .catch(err => console.error(`Error loading ${name}.json:`, err));
        }

        let currentSlideName = document.getElementById('slide-select').value;
        document.getElementById('slide-select').addEventListener('change', e => {
            currentSlideName = e.target.value;
            loadSlide(currentSlideName);
        });
        window.addEventListener('resize', () => {
            if (window._slideData) buildGrid(window._slideData);
        });
        loadSlide(currentSlideName);
    </script>
</body>
</html>
